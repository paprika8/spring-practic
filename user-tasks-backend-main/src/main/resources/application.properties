server.error.whitelabel.enabled=false

spring.datasource.url=jdbc:mariadb://localhost:3306/taskdata?zeroDateTimeBehavior=CONVERT_TO_NULL
spring.datasource.username=springuser
spring.datasource.password=12345
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MariaDBDialect

#spring.jpa.properties.hibernate.hbm2ddl.auto=create

taskmanager.app.jwtCookieName=taskdata
taskmanager.app.jwtSecret=secret
taskmanager.app.jwtExpirationMs=30000

file.upload.directory=uploads
